# prefixo
# troca Ctrl+B (padrão do tmux) por Ctrl+A, mais ergonômico.
# bind C-a send-prefix permite enviar Ctrl+A para programas internos (ex: bash).
unbind C-b
set -g prefix C-a
bind C-a send-prefix


# comportamento geral
set -g base-index 1            # janelas começam em 1 em vez de 0
setw -g pane-base-index 1      # panes também começam em 1
set -g renumber-windows on     # renumera automaticamente ao fechar uma janela
set -sg escape-time 0          # remove o delay do ESC (evita lentidão no nvim)


# mouse
# permite scroll, clique em pane, redimensionar bordas com o mouse.
set -g mouse on


# divisões de pane
# | abre split horizontal, - abre split vertical.
# -c mantém o diretório atual ao abrir o novo pane.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %


# redimensionar panes com Alt + Setas
# -n significa que não precisa pressionar o prefixo (Ctrl+A) antes.
bind -n M-Left  resize-pane -L 5
bind -n M-Right resize-pane -R 5
bind -n M-Up    resize-pane -U 5
bind -n M-Down  resize-pane -D 5


# status bar
# interval: intervalo em segundos para atualizar a barra.
# status-left: exibe o nome da sessão em negrito.
# status-right: exibe data e hora.
set -g status-interval 5
set -g status-left  "#[bold]#S  "
set -g status-right "%Y-%m-%d %H:%M"


# cores
# origem: ~/.cache/wal/colors-tmux.conf  (gerado por: wal -i <wallpaper>)
source-file -q ~/.cache/wal/colors-tmux.conf
