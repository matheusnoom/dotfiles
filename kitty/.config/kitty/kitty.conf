# fonte
font_family      JetBrainsMono Nerd Font
font_size        11.0

# modify_font cell_height 2px


# cursor
# block | beam | underline
cursor_shape           block
cursor_blink_interval  0.75
cursor_stop_blinking_after 0


# janela
remember_window_size   no
initial_window_width   120c
initial_window_height  55c
placement_strategy     center
window_padding_width 10


# background_opacity 0.92
background_blur_radius 20
hide_window_decorations yes

# controle remoto — permite recarregar cores sem reiniciar o kitty
# (usado por: kitty @ set-colors --configured --all ~/.cache/wal/colors-kitty.conf)
allow_remote_control yes


# cores
# origem: ~/.cache/wal/colors-kitty.conf  (gerado por: wal -i <wallpaper>)
# para trocar: rode wal -i ~/Pictures/wallpaper.png e depois recarregue:
#   kitty @ set-colors --configured --all ~/.cache/wal/colors-kitty.conf
#
# override — kitty usa o ÚLTIMO valor declarado, então escreva APÓS o include.
# overrides abaixo continuam valendo a cada reload do kitty.conf (Ctrl+Shift+F5).
include ~/.cache/wal/colors-kitty.conf
  background #000000
  active_border_color   #782634
  inactive_border_color #782634


# barra de abas
# fade | slant | separator | powerline | hidden
tab_bar_style        powerline
# angled | slanted | round
tab_powerline_style  slanted
tab_bar_min_tabs     2

# tab_bar_background       #111111
# active_tab_foreground    #ffffff
# active_tab_background    #333333
# inactive_tab_foreground  #666666
# inactive_tab_background  #1a1a1a


# scrollback
scrollback_lines 10000


# performance
repaint_delay 8
input_delay   2


# urls
# none | single | double | curly
url_style    single
detect_urls  yes


# atalhos — referência (padrões do Linux, não precisam ser declarados)
# --- abas ---
# Ctrl+Shift+T        nova aba
# Ctrl+Shift+Q        fechar aba
# Ctrl+Shift+→ / ←   próxima / anterior aba
#
# --- janelas / splits ---
# Ctrl+Shift+Enter    nova janela (split)
# Ctrl+Shift+W        fechar janela
# Ctrl+Shift+] / [   próxima / anterior janela
# Ctrl+Shift+F / B   mover janela para frente / trás (reordena splits)
# Ctrl+Shift+R        redimensionar janela
#
# --- geral ---
# Ctrl+Shift+C / V    copiar / colar
# Ctrl+Shift+= / -    aumentar / diminuir fonte
# Ctrl+Shift+Backspace resetar tamanho da fonte
# Ctrl+Shift+/        buscar no scrollback
